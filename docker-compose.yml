services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://ascent:ascent@postgres:5432/ascent
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ascent
      POSTGRES_PASSWORD: ascent
      POSTGRES_DB: ascent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
